# configs/config.production.yaml
environment: production

server:
  port: 4001
  host: "0.0.0.0"
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 30s

database:
  host: ${DB_HOST}
  port: ${DB_PORT}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  dbname: ${DB_NAME}
  sslmode: require
  max_open_conns: 100
  max_idle_conns: 50
  conn_max_lifetime: 10m

jwt:
  secret: ${JWT_SECRET}
  access_token_duration: 15m
  refresh_token_duration: 72h # 3 días en producción
  issuer: "farmanexo-auth-service"

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  password: ${REDIS_PASSWORD}
  db: 0
  max_retries: 3
  pool_size: 50

aws:
  region: ${AWS_REGION}
  endpoint: ""

sqs:
  auth_events_queue_url: ${SQS_AUTH_EVENTS_QUEUE_URL}


log:
  level: info
  encoding: json # JSON estructurado para producción
