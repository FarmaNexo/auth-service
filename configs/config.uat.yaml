# configs/config.uat.yaml
environment: uat

server:
  port: 4001
  host: "0.0.0.0"
  read_timeout: 20s
  write_timeout: 20s
  idle_timeout: 45s

database:
  host: ${DB_HOST}
  port: 5432
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  dbname: auth_db_uat
  sslmode: require
  max_open_conns: 50
  max_idle_conns: 25
  conn_max_lifetime: 8m

jwt:
  secret: ${JWT_SECRET}
  access_token_duration: 30m
  refresh_token_duration: 120h
  issuer: "farmanexo-auth-service-uat"

redis:
  host: ${REDIS_HOST}
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0
  max_retries: 3
  pool_size: 20

aws:
  region: ${AWS_REGION}
  endpoint: ""

sqs:
  auth_events_queue_url: ${SQS_AUTH_EVENTS_QUEUE_URL}


log:
  level: info
  encoding: json
