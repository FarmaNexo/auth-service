# configs/config.local.yaml
# Configuración para máquina local del desarrollador
# Este archivo NO se sube al repositorio (.gitignore)
environment: local

server:
  port: 4001
  host: "0.0.0.0"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

database:
  host: localhost
  port: 5432
  user: admin
  password: admin
  dbname: auth_db
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m

jwt:
  secret: "dev-super-secret-key-change-in-production-min-32-chars"
  access_token_duration: 15m
  refresh_token_duration: 168h
  issuer: "farmanexo-auth-service"

redis:
  host: localhost
  port: 6379
  password: "farmanexo2026"
  db: 0
  max_retries: 3
  pool_size: 10

aws:
  region: "us-east-1"
  endpoint: "http://localhost:4566"

sqs:
  auth_events_queue_url: "http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/farmanexo-auth-events"

log:
  level: debug
  encoding: console
